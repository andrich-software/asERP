name: aserp-mssql

# Alternate stack — MSSQL backend instead of postgres.
# Bring up with:  docker compose -f docker-compose.mssql.yml up -d
# Add WASM:       docker compose -f docker-compose.mssql.yml --profile wasm up -d
#
# This file is self-contained (no .env auto-loading via cli.sh). ASERP_SERVER_PORT
# and ASERP_RESTRICT_SERVER_URL are read from the shell environment if set.

# Cap Docker's json-file container logs so stdout/stderr can't fill the host disk
# (the default driver grows unbounded). 10 MB × 5 files = 50 MB max per container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  server:
    image: ${DOCKER_REGISTRY-}andrichsoftware/aserp-server:latest
    build:
      context: .
      dockerfile: src/asERP.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      - DatabaseConfig__Provider=MSSQL
      - DatabaseConfig__ConnectionString=Server=mssql;Database=aserp_01;User Id=aserp;Password=aserp123!;TrustServerCertificate=True;
      - Logging__LogLevel__Default=Warning
      # Serilog reads Serilog:MinimumLevel, not Logging:LogLevel — this is the
      # setting that actually caps the server's stdout log volume.
      - Serilog__MinimumLevel__Default=Warning
    ports:
      - "${ASERP_SERVER_PORT:-8443}:8443"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "SqlServer123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - aserp-mssql-data:/var/opt/mssql
      - ./scripts/mssql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups/mssql:/backups
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P SqlServer123! -Q 'SELECT 1' || exit 1"]
      timeout: 20s
      retries: 10
      interval: 30s
      start_period: 60s

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}andrichsoftware/aserp-web:latest
    build:
      context: .
      dockerfile: src/asERP.Client/Dockerfile
    environment:
      - ASERP_RESTRICT_SERVER_URL=${ASERP_RESTRICT_SERVER_URL:-}
    ports:
      - "${ASERP_WASM_PORT:-8444}:80"
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

volumes:
  aserp-mssql-data:

networks:
  backend:
    driver: bridge
