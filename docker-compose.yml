name: aserp

# Database backend is selected via DB_MODE in .env (see .env.example).
# The CLI script (./cli.sh) translates DB_MODE into:
#   - DB_PROVIDER          → PostgreSQL | MSSQL
#   - DB_CONNECTION_STRING → engine-specific connection string
# and activates the 'postgres-internal' profile only for DB_MODE=internal.
#
#   DB_MODE=internal  → activates 'server' + 'postgres-internal',
#                       embedded postgres container, no credentials needed.
#   DB_MODE=postgres  → activates only 'server', external postgres from .env.
#   DB_MODE=mssql     → activates only 'server', external SQL Server.

services:
  server:
    profiles: ["server"]
    image: ${DOCKER_REGISTRY-}andrichsoftware/aserp-server:latest
    container_name: aserp-server
    build:
      context: .
      dockerfile: src/asERP.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      # Informational only — used by the startup banner so it shows the
      # host-side port instead of the container-internal 8443.
      - ASERP_PUBLIC_PORT=${ASERP_SERVER_PORT:-8443}
      # Toggle public self-registration. Default false — server rejects
      # POST /api/v1/auth/register and reports registrationEnabled=false on
      # GET /api/v1/server-info.
      - SERVER_REGISTRATION_ENABLED=${SERVER_REGISTRATION_ENABLED:-false}
      - DatabaseConfig__Provider=${DB_PROVIDER}
      - DatabaseConfig__ConnectionString=${DB_CONNECTION_STRING}
      # Persist DataProtection keys onto the aserp-data volume (mounted at
      # /app/data) so they survive container rebuilds. Without this they land in
      # the ephemeral image filesystem and password-reset / email-confirmation
      # tokens break after every redeploy.
      - DataProtection__KeyDirectory=/app/data/dp-keys
      # Persist product images onto the aserp-data volume too. The default
      # RootPath is relative (App_Data/files) and resolves to /app/App_Data/files
      # in the container — outside the volume — so uploaded/imported images would
      # be lost on every rebuild/redeploy. Point it at /app/data so they survive.
      - FileStorage__RootPath=/app/data/files
      - Logging__LogLevel__Default=Warning
      # Web-analytics ClickHouse — reachable only inside the 'backend' network. These seed the
      # server's ClickHouse.* settings on first run; afterwards they are editable in Settings
      # (e.g. to point at an external ClickHouse).
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-aserp_analytics}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-aserp}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-aserp}
      - CLICKHOUSE_ENABLED=true
    ports:
      - "${ASERP_SERVER_PORT:-8443}:8443"
    volumes:
      - aserp-data:/app/data
    # depends_on referring to a service in an inactive profile is silently
    # ignored by docker compose — so this only kicks in for internal mode.
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      clickhouse:
        condition: service_healthy
        required: false
    # Lets the server reach a Postgres/MSSQL running on the Docker host
    # (DB_MODE=postgres|mssql with DB_HOST=host.docker.internal). On Linux this
    # name only resolves when explicitly mapped to the host gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    restart: unless-stopped

  postgres:
    profiles: ["postgres-internal"]
    image: postgres:16-alpine
    container_name: aserp-postgres
    # Credentials are fixed because the container is reachable only inside
    # the docker network and is managed exclusively by ./cli.sh.
    environment:
      POSTGRES_DB: aserp
      POSTGRES_USER: aserp
      POSTGRES_PASSWORD: aserp
      PGDATA: /var/lib/postgresql/data/pgdata
    # Postgres is reachable only inside the 'backend' network — not published to the host.
    # Uncomment the next two lines if you need to connect from the host (e.g. psql, backup tools).
    # ports:
    #   - "5432:5432"
    volumes:
      - aserp-postgres-data:/var/lib/postgresql/data
      - ./backups/postgresql:/backups
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aserp -d aserp"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

  clickhouse:
    # Started together with the server (same 'server' profile), so `./cli deploy server`
    # brings up web analytics automatically. Reachable only inside the 'backend' network —
    # the HTTP (8123) and native (9000) ports are NOT published to the host.
    profiles: ["server"]
    image: clickhouse/clickhouse-server:24-alpine
    container_name: aserp-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-aserp_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-aserp}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-aserp}
      # Let the created user run DDL (CREATE TABLE) for its own database.
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    # ClickHouse uses NUMA syscalls (get_mempolicy/set_mempolicy/mbind) for
    # NUMA-aware memory allocation. Docker's default seccomp profile denies them,
    # so ClickHouse logs a harmless "get_mempolicy: Operation not permitted" on
    # every start. SYS_NICE allows the syscalls and silences the noise.
    cap_add:
      - SYS_NICE
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - aserp-clickhouse-data:/var/lib/clickhouse
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      # Use 127.0.0.1, not localhost: localhost resolves to ::1 (IPv6) in the
      # container while ClickHouse only listens on IPv4 (0.0.0.0) — so a
      # localhost healthcheck gets "connection refused" and reports unhealthy.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      timeout: 10s
      retries: 10
      interval: 10s
      start_period: 30s

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}andrichsoftware/aserp-web:latest
    container_name: aserp-wasm
    build:
      context: .
      dockerfile: src/asERP.Client/Dockerfile
    environment:
      # When set, the WASM client locks the API to this URL and hides the
      # server-URL field on the login screen. Leave empty to let users enter
      # any server URL on login (default behaviour).
      - ASERP_RESTRICT_SERVER_URL=${ASERP_RESTRICT_SERVER_URL:-}
    ports:
      - "${ASERP_WASM_PORT:-8444}:80"
    networks:
      - backend
    restart: unless-stopped

volumes:
  aserp-data:
  aserp-postgres-data:
  aserp-clickhouse-data:

networks:
  backend:
    driver: bridge
