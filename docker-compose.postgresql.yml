name: aserp-postgresql

# Alternate stack — PostgreSQL backend with the legacy 'aserp_01' database
# name (kept for parity with the other engine-specific compose files).
# For the canonical postgres setup, use docker-compose.yml together with
# ./cli.sh which supports both internal and external postgres.
#
# Bring up with:  docker compose -f docker-compose.postgresql.yml up -d
# Add WASM:       docker compose -f docker-compose.postgresql.yml --profile wasm up -d

services:
  server:
    image: ${DOCKER_REGISTRY-}andrichsoftware/aserp-server:latest
    build:
      context: .
      dockerfile: src/asERP.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      - DatabaseConfig__Provider=PostgreSQL
      - DatabaseConfig__ConnectionString=Host=postgresql;Port=5432;Database=aserp_01;Username=aserp;Password=aserp;
      - Logging__LogLevel__Default=Warning
    ports:
      - "${ASERP_SERVER_PORT:-8443}:8443"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aserp_01
      POSTGRES_USER: aserp
      POSTGRES_PASSWORD: aserp
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - aserp-postgresql-data:/var/lib/postgresql/data
      - ./backups/postgresql:/backups
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aserp -d aserp_01"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}andrichsoftware/aserp-web:latest
    build:
      context: .
      dockerfile: src/asERP.Client/Dockerfile
    environment:
      - ASERP_RESTRICT_SERVER_URL=${ASERP_RESTRICT_SERVER_URL:-}
    ports:
      - "${ASERP_WASM_PORT:-8444}:80"
    networks:
      - backend
    restart: unless-stopped

volumes:
  aserp-postgresql-data:

networks:
  backend:
    driver: bridge
