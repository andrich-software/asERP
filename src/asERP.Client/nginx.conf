server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 1000;

    # Entry points must never be cached — they point at the current build's
    # hashed package directory and carry runtime config. Caching them at the
    # edge means a redeploy keeps serving stale references to assets that
    # no longer exist (and the CDN may even cache the resulting 404s).
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }
    location = /config.json {
        add_header Cache-Control "no-store" always;
    }
    location = /service-worker.js {
        add_header Cache-Control "no-store" always;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store" always;
    }

    # Bootstrap entry files inside the package dir have FIXED names (no
    # per-content hash) and list the current build's hashed runtime files
    # (e.g. uno-config.js -> _framework/dotnet.<hash>.js). The package_<hash>/
    # path is NOT guaranteed to change between deploys (it can stay stable
    # while the .NET runtime hashes change), so caching these as immutable
    # poisons clients: they keep requesting old _framework/dotnet.<hash>.js
    # that no longer exist (404) and the app never boots. Always revalidate.
    location ~ ^/package_[a-f0-9]+/(uno-config\.js|require\.js|uno-bootstrap\.js)$ {
        add_header Cache-Control "no-cache" always;
    }

    # Remaining package assets are content-addressed (hash in the filename),
    # so they are safe to cache forever even if the package_<hash>/ dir is reused.
    location ~ ^/package_[a-f0-9]+/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Fallback rules for files outside the hashed package dir.
    location ~* \.(wasm|dll|pdb|dat|blat)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
