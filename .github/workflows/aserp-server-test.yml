name: asERP.Server Build and Test

on:
  push:
    branches-ignore: [ main ]
    paths:
      - '.github/workflows/**'
      - 'src/asERP.Server/**'
      - 'src/asERP.Core/**'
      - 'src/asERP.Domain/**'
      - 'src/asERP.Application/**'
      - 'src/asERP.Analytics/**'
      - 'src/asERP.Identity/**'
      - 'src/asERP.Infrastructure/**'
      - 'src/asERP.Persistence/**'
      - 'src/asERP.Persistence.MSSQL/**'
      - 'src/asERP.Persistence.PosgreSQL/**'
      - 'src/asERP.SalesChannels/**'
      - 'src/asERP.Persistence/**'
      - 'src/asERP.Application.Persistence.IntegrationTests/**'
      - 'src/asERP.Application.UnitTests/**'
      - 'src/asERP.Server.Tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/asERP.Server/**'
      - 'src/asERP.Core/**'
      - 'src/asERP.Domain/**'
      - 'src/asERP.Application/**'
      - 'src/asERP.Analytics/**'
      - 'src/asERP.Identity/**'
      - 'src/asERP.Infrastructure/**'
      - 'src/asERP.Persistence/**'
      - 'src/asERP.SalesChannels/**'
      - 'src/asERP.Persistence/**'
      - 'src/asERP.Persistence.MSSQL/**'
      - 'src/asERP.Persistence.PostgreSQL/**'
      - 'src/asERP.Application.Persistence.IntegrationTests/**'
      - 'src/asERP.Application.UnitTests/**'
      - 'src/asERP.Server.Tests/**'

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore asERP.Server.Tests
        run: dotnet restore tests/asERP.Server.Tests
      - name: Build asERP.Server.Tests
        run: dotnet build tests/asERP.Server.Tests
      - name: Test asERP.Server.Tests
        run: dotnet test tests/asERP.Server.Tests --no-build --verbosity normal