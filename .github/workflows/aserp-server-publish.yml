name: asERP.Server Publish

on:
  push:
    branches: [ main ]
    paths:
      - 'src/asERP.Server/**'
      - 'src/asERP.Core/**'
      - 'src/asERP.Domain/**'
      - 'src/asERP.Application/**'
      - 'src/asERP.Analytics/**'
      - 'src/asERP.Identity/**'
      - 'src/asERP.Infrastructure/**'
      - 'src/asERP.Persistence/**'
      - 'src/asERP.SalesChannels/**'
      - 'src/asERP.Persistence/**'
      - 'src/asERP.Persistence.MSSQL/**'
      - 'src/asERP.Persistence.PostgreSQL/**'
      - 'src/asERP.Application.Persistence.IntegrationTests/**'
      - 'src/asERP.Application.UnitTests/**'
      - 'src/asERP.Server.Tests/**'

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore asERP.Server.Tests
        run: dotnet restore tests/asERP.Server.Tests
      - name: Build asERP.Server.Tests
        run: dotnet build tests/asERP.Server.Tests --no-restore
      - name: Test asERP.Server.Tests
        run: dotnet test tests/asERP.Server.Tests --no-build --verbosity normal
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: aserp/server

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./src/asERP.Server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: aserp/server:latest
