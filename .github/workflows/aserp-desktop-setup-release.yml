name: Release asERP Desktop Setup (Windows)

# Builds the Windows installer for asERP Desktop and (when the MICROSOFT_STORE_*
# secrets are present) also feeds it to the Microsoft Store. Store wording is kept
# out of all user-facing texts (release title/body, tags) on purpose — it confused
# users; the Store plumbing below is internal.
#
# The Microsoft Store product for the desktop client is an "EXE/MSI app"
# (Partner Center dashboard/win32apps/...), NOT an MSIX/UWP package. That product
# type is fed with a signed .exe installer hosted at a public HTTPS URL, and is
# submitted through the Microsoft Store Submission API v2 (via the official
# microsoft/store-submission action). This workflow therefore:
#   1. builds a self-contained desktop client,
#   2. packages it into an Inno Setup installer (installer/asERP.Client.Setup.iss),
#   3. (optionally) code-signs the installer,
#   4. publishes it as a GitHub Release (public repo -> stable packageUrl),
#   5. creates & publishes a Store submission that points at that packageUrl.
#
# Required repository secrets (MICROSOFT_ prefix keeps them apart from a future
# Apple App Store set):
#   MICROSOFT_STORE_SELLER_ID     Partner Center seller id (Account settings > Legal info)
#   MICROSOFT_STORE_PRODUCT_ID    the app's product id (6f124749-737c-4b56-872c-a4dc844e98d0)
#   MICROSOFT_STORE_TENANT_ID     Microsoft Entra ID tenant id associated with Partner Center
#   MICROSOFT_STORE_CLIENT_ID     Entra ID app (Manager role) client id
#   MICROSOFT_STORE_CLIENT_SECRET Entra ID app client secret
# Installer code signing via Azure Artifact Signing (formerly Trusted Signing);
# required for Store certification to pass. Secrets (service principal that holds
# the "Artifact Signing Certificate Profile Signer" role on the signing account):
#   AZURE_TENANT_ID     Entra tenant of the signing service principal
#   AZURE_CLIENT_ID     signing service principal (app registration) client id
#   AZURE_CLIENT_SECRET signing service principal client secret
# Non-secret config as repository *variables* (Settings > Secrets and variables >
# Actions > Variables):
#   TRUSTED_SIGNING_ENDPOINT   region endpoint, e.g. https://weu.codesigning.azure.net/
#   TRUSTED_SIGNING_ACCOUNT    the Artifact/Trusted Signing account name
#   TRUSTED_SIGNING_PROFILE    the certificate profile name (public trust)
#
# Without the MICROSOFT_STORE_* secrets the job still builds, signs and releases the
# installer; it just skips the Store submission steps. Without the AZURE_* secrets it
# skips signing (fine for testing, but the Store will reject an unsigned installer at
# certification).
#
# The 'auto_publish' input controls the final submit: leave it false (default) to
# only push the package into the draft — you then review and click Submit in Partner
# Center (recommended for the very first submission). Set it true for hands-off
# publishing on later releases.
#
# IMPORTANT prerequisites for the Store submission steps to work (they otherwise
# fail on the 'update' step with {"errors":[{"message":"Not found"}]}):
#   - The app's VERY FIRST submission must be created manually in Partner Center
#     (add the package under the Packages step, then Submit). The Submission API
#     cannot bootstrap the first submission; it only updates subsequent ones.
#   - The product must be FREE — the Store Developer CLI update/publish operations
#     currently support free products only.

on:
  workflow_dispatch:
    inputs:
      auto_publish:
        description: 'Submit the Store submission automatically (else only update the draft package)'
        type: boolean
        default: false

jobs:
  windows-store-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      STORE_SELLER_ID: ${{ secrets.MICROSOFT_STORE_SELLER_ID }}
      STORE_PRODUCT_ID: ${{ secrets.MICROSOFT_STORE_PRODUCT_ID }}
      STORE_TENANT_ID: ${{ secrets.MICROSOFT_STORE_TENANT_ID }}
      STORE_CLIENT_ID: ${{ secrets.MICROSOFT_STORE_CLIENT_ID }}
      STORE_CLIENT_SECRET: ${{ secrets.MICROSOFT_STORE_CLIENT_SECRET }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    - name: Generate version
      id: version
      shell: pwsh
      run: |
        # YYYY.MM.DD.RunNumber — identical scheme to the other release workflows.
        # Each part stays < 65536, so it is also a valid Win32 file version.
        $version = "{0}.{1}" -f (Get-Date -Format 'yyyy.MM.dd'), $env:GITHUB_RUN_NUMBER
        "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Host "Generated version: $version"

    - name: Restore workloads
      run: dotnet workload restore src/asERP.Client/asERP.Client.csproj

    - name: Publish client (self-contained win-x64)
      shell: pwsh
      run: |
        dotnet publish src/asERP.Client/asERP.Client.csproj `
          --configuration Release `
          --framework net10.0-desktop `
          --runtime win-x64 `
          --self-contained true `
          -p:UseMonoRuntime=false `
          -p:Version=${{ steps.version.outputs.VERSION }} `
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }} `
          -p:FileVersion=${{ steps.version.outputs.VERSION }} `
          --output ./publish/client

    - name: Compile installer (Inno Setup)
      shell: pwsh
      run: |
        # Inno Setup 6 is preinstalled on windows-latest images; fall back to choco.
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) {
          choco install innosetup -y --no-progress
        }
        & $iscc `
          /DAppVersion=${{ steps.version.outputs.VERSION }} `
          /DClientPublishDir=..\publish\client `
          installer\asERP.Client.Setup.iss

    # Sign with Azure Artifact Signing (cloud HSM, no .pfx). Skipped until the
    # AZURE_* secrets are configured, so the pipeline still builds/releases before
    # then — but an unsigned installer will be rejected at Store certification.
    - name: Sign installer (Azure Artifact Signing)
      if: env.AZURE_CLIENT_ID != ''
      uses: azure/artifact-signing-action@v2
      with:
        azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
        azure-client-id: ${{ env.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ env.AZURE_CLIENT_SECRET }}
        endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
        signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
        certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
        files: ${{ github.workspace }}\installer\output\asERP-Desktop-Setup-${{ steps.version.outputs.VERSION }}.exe
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    - name: Create GitHub Release with installer
      uses: softprops/action-gh-release@v2
      with:
        # "setup-v" prefix keeps installer releases apart from the desktop zip
        # releases ("v...") and the server installer releases ("server-v...").
        tag_name: setup-v${{ steps.version.outputs.VERSION }}
        name: asERP Desktop Setup v${{ steps.version.outputs.VERSION }}
        body: |
          ## asERP Desktop Setup v${{ steps.version.outputs.VERSION }}

          Signed Windows installer of asERP Desktop (Uno Platform).

          ### Installer
          - **Windows (x64)**: `asERP-Desktop-Setup-${{ steps.version.outputs.VERSION }}.exe`

          The installer is self-contained — no .NET runtime required.

          ---

          🤖 Automatically built by GitHub Actions
        draft: false
        prerelease: false
        files: |
          installer/output/asERP-Desktop-Setup-${{ steps.version.outputs.VERSION }}.exe
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Store credentials
      if: env.STORE_CLIENT_ID != ''
      uses: microsoft/store-submission@v1
      with:
        command: configure
        type: win32
        seller-id: ${{ env.STORE_SELLER_ID }}
        product-id: ${{ env.STORE_PRODUCT_ID }}
        tenant-id: ${{ env.STORE_TENANT_ID }}
        client-id: ${{ env.STORE_CLIENT_ID }}
        client-secret: ${{ env.STORE_CLIENT_SECRET }}

    - name: Update Store draft submission
      if: env.STORE_CLIENT_ID != ''
      uses: microsoft/store-submission@v1
      with:
        command: update
        type: win32
        product-update: >-
          {"packages":[{"packageUrl":"https://github.com/${{ github.repository }}/releases/download/setup-v${{ steps.version.outputs.VERSION }}/asERP-Desktop-Setup-${{ steps.version.outputs.VERSION }}.exe","languages":["de","en"],"architectures":["X64"],"packageType":"exe","isSilentInstall":true,"installerParameters":"/VERYSILENT /SUPPRESSMSGBOXES /NORESTART"}]}

    - name: Publish Store submission
      if: ${{ env.STORE_CLIENT_ID != '' && inputs.auto_publish }}
      uses: microsoft/store-submission@v1
      with:
        command: publish
        type: win32
