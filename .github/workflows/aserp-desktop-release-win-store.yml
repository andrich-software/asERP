name: Release asERP.Client to Windows Store

# The Microsoft Store product for the desktop client is an "EXE/MSI app"
# (Partner Center dashboard/win32apps/...), NOT an MSIX/UWP package. That product
# type is fed with a signed .exe installer hosted at a public HTTPS URL, and is
# submitted through the Microsoft Store Submission API v2 (via the official
# microsoft/store-submission action). This workflow therefore:
#   1. builds a self-contained desktop client,
#   2. packages it into an Inno Setup installer (installer/asERP.Client.Setup.iss),
#   3. (optionally) code-signs the installer,
#   4. publishes it as a GitHub Release (public repo -> stable packageUrl),
#   5. creates & publishes a Store submission that points at that packageUrl.
#
# Required repository secrets (MICROSOFT_ prefix keeps them apart from a future
# Apple App Store set):
#   MICROSOFT_STORE_SELLER_ID     Partner Center seller id (Account settings > Legal info)
#   MICROSOFT_STORE_PRODUCT_ID    the app's product id (6f124749-737c-4b56-872c-a4dc844e98d0)
#   MICROSOFT_STORE_TENANT_ID     Microsoft Entra ID tenant id associated with Partner Center
#   MICROSOFT_STORE_CLIENT_ID     Entra ID app (Manager role) client id
#   MICROSOFT_STORE_CLIENT_SECRET Entra ID app client secret
# Optional (installer code signing; required for Store certification to pass):
#   WINDOWS_CERTIFICATE_BASE64      base64 of a .pfx whose cert chains to a
#                                   Microsoft Trusted Root Program CA
#   WINDOWS_CERTIFICATE_PASSWORD    the .pfx password
#
# Without the MICROSOFT_STORE_* secrets the job still builds, signs and releases the
# installer; it just skips the Store submission steps. Without the certificate
# secrets it skips signing (fine for testing, but the Store will reject an
# unsigned installer at certification).
#
# The 'auto_publish' input controls the final submit: leave it false (default) to
# only push the package into the draft — you then review and click Submit in Partner
# Center (recommended for the very first submission). Set it true for hands-off
# publishing on later releases.

on:
  workflow_dispatch:
    inputs:
      auto_publish:
        description: 'Submit the Store submission automatically (else only update the draft package)'
        type: boolean
        default: false

jobs:
  windows-store-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      SIGN_CERT_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      STORE_SELLER_ID: ${{ secrets.MICROSOFT_STORE_SELLER_ID }}
      STORE_PRODUCT_ID: ${{ secrets.MICROSOFT_STORE_PRODUCT_ID }}
      STORE_TENANT_ID: ${{ secrets.MICROSOFT_STORE_TENANT_ID }}
      STORE_CLIENT_ID: ${{ secrets.MICROSOFT_STORE_CLIENT_ID }}
      STORE_CLIENT_SECRET: ${{ secrets.MICROSOFT_STORE_CLIENT_SECRET }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    - name: Generate version
      id: version
      shell: pwsh
      run: |
        # YYYY.MM.DD.RunNumber — identical scheme to the other release workflows.
        # Each part stays < 65536, so it is also a valid Win32 file version.
        $version = "{0}.{1}" -f (Get-Date -Format 'yyyy.MM.dd'), $env:GITHUB_RUN_NUMBER
        "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Host "Generated version: $version"

    - name: Restore workloads
      run: dotnet workload restore src/asERP.Client/asERP.Client.csproj

    - name: Publish client (self-contained win-x64)
      shell: pwsh
      run: |
        dotnet publish src/asERP.Client/asERP.Client.csproj `
          --configuration Release `
          --framework net10.0-desktop `
          --runtime win-x64 `
          --self-contained true `
          -p:UseMonoRuntime=false `
          -p:Version=${{ steps.version.outputs.VERSION }} `
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }} `
          -p:FileVersion=${{ steps.version.outputs.VERSION }} `
          --output ./publish/client

    - name: Compile installer (Inno Setup)
      shell: pwsh
      run: |
        # Inno Setup 6 is preinstalled on windows-latest images; fall back to choco.
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) {
          choco install innosetup -y --no-progress
        }
        & $iscc `
          /DAppVersion=${{ steps.version.outputs.VERSION }} `
          /DClientPublishDir=..\publish\client `
          installer\asERP.Client.Setup.iss

    - name: Sign installer
      if: env.SIGN_CERT_BASE64 != ''
      shell: pwsh
      run: |
        $installer = "installer/output/asERP-Desktop-Setup-${{ steps.version.outputs.VERSION }}.exe"

        # Materialize the signing certificate from the base64 secret. Strip any
        # whitespace/line breaks first (wrapped `base64` output is a common gotcha).
        # A non-base64 value is treated as a placeholder: warn and skip signing so
        # a dummy secret doesn't break the pipeline. A real cert that then fails in
        # signtool below still fails the job.
        $clean = ($env:SIGN_CERT_BASE64 -replace '\s','')
        try {
          $certBytes = [System.Convert]::FromBase64String($clean)
        } catch {
          Write-Warning "WINDOWS_CERTIFICATE_BASE64 is not valid base64 (placeholder?) - skipping signing. The installer will be UNSIGNED and the Store will reject it at certification."
          exit 0
        }
        $certPath = "${{ github.workspace }}\certificate.pfx"
        [System.IO.File]::WriteAllBytes($certPath, $certBytes)

        # Find the latest signtool.exe in the installed Windows SDKs.
        $winKitsPath = "C:\Program Files (x86)\Windows Kits\10\bin"
        $signtool = Get-ChildItem -Path $winKitsPath -Directory |
          Where-Object { $_.Name -match "^10\.0\.\d+\.\d+$" } |
          Sort-Object { [version]($_.Name -replace "^10\.0\.","") } -Descending |
          ForEach-Object { Join-Path $_.FullName "x64\signtool.exe" } |
          Where-Object { Test-Path $_ } |
          Select-Object -First 1
        if (-not $signtool) { Write-Error "signtool.exe not found in any Windows SDK."; exit 1 }

        & $signtool sign `
          /f $certPath `
          /p $env:SIGN_CERT_PASSWORD `
          /fd SHA256 `
          /tr http://timestamp.digicert.com `
          /td SHA256 `
          $installer
        if ($LASTEXITCODE -ne 0) { Write-Error "signtool sign failed."; exit 1 }

        Remove-Item $certPath -Force -ErrorAction SilentlyContinue

    - name: Create GitHub Release with installer
      uses: softprops/action-gh-release@v2
      with:
        tag_name: store-v${{ steps.version.outputs.VERSION }}
        name: asERP Windows Store v${{ steps.version.outputs.VERSION }}
        body: |
          ## asERP Windows Store Release v${{ steps.version.outputs.VERSION }}

          Signed Windows installer of the asERP desktop client (Uno Platform),
          submitted to the Microsoft Store (EXE/MSI app).

          ### Installer
          - **Windows (x64)**: `asERP-Desktop-Setup-${{ steps.version.outputs.VERSION }}.exe`

          The installer is self-contained — no .NET runtime required. This same
          asset is the package the Microsoft Store submission points at.

          ---

          🤖 Automatically built by GitHub Actions
        draft: false
        prerelease: false
        files: |
          installer/output/asERP-Desktop-Setup-${{ steps.version.outputs.VERSION }}.exe
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Store credentials
      if: env.STORE_CLIENT_ID != ''
      uses: microsoft/store-submission@v1
      with:
        command: configure
        type: win32
        seller-id: ${{ env.STORE_SELLER_ID }}
        product-id: ${{ env.STORE_PRODUCT_ID }}
        tenant-id: ${{ env.STORE_TENANT_ID }}
        client-id: ${{ env.STORE_CLIENT_ID }}
        client-secret: ${{ env.STORE_CLIENT_SECRET }}

    - name: Update Store draft submission
      if: env.STORE_CLIENT_ID != ''
      uses: microsoft/store-submission@v1
      with:
        command: update
        type: win32
        product-update: >-
          {"packages":[{"packageUrl":"https://github.com/${{ github.repository }}/releases/download/store-v${{ steps.version.outputs.VERSION }}/asERP-Desktop-Setup-${{ steps.version.outputs.VERSION }}.exe","languages":["de","en"],"architectures":["X64"],"packageType":"exe","isSilentInstall":true,"installerParameters":"/VERYSILENT /SUPPRESSMSGBOXES /NORESTART"}]}

    - name: Publish Store submission
      if: ${{ env.STORE_CLIENT_ID != '' && inputs.auto_publish }}
      uses: microsoft/store-submission@v1
      with:
        command: publish
        type: win32
