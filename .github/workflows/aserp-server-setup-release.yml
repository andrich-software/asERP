name: Release asERP Server Setup (Windows)

on:
  push:
    branches: [ main ]
    paths:
      - 'src/asERP.Server/**'
      - 'src/asERP.Server.Tray/**'
      - 'src/asERP.Domain/**'
      - 'src/asERP.Application/**'
      - 'src/asERP.Analytics/**'
      - 'src/asERP.Identity/**'
      - 'src/asERP.Infrastructure/**'
      - 'src/asERP.Persistence/**'
      - 'src/asERP.Persistence.MSSQL/**'
      - 'src/asERP.Persistence.PostgreSQL/**'
      - 'src/asERP.Persistence.SQLite/**'
      - 'src/asERP.SalesChannels/**'
      - 'src/asERP.Shipping/**'
      - 'installer/**'
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
    - name: Generate version
      id: version
      run: |
        VERSION=$(date +%Y.%m.%d).${GITHUB_RUN_NUMBER}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"

  build-installer:
    runs-on: windows-latest
    needs: version
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    - name: Publish server (self-contained win-x64)
      run: |
        dotnet publish src/asERP.Server/asERP.Server.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:Version=${{ needs.version.outputs.version }} `
          -p:GeneratePackageOnBuild=false `
          --output ./publish/server
      shell: pwsh

    - name: Publish tray (self-contained win-x64)
      run: |
        dotnet publish src/asERP.Server.Tray/asERP.Server.Tray.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:Version=${{ needs.version.outputs.version }} `
          --output ./publish/tray
      shell: pwsh

    - name: Compile installer
      run: |
        # Inno Setup 6 is preinstalled on windows-latest images; fall back to choco.
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) {
          choco install innosetup -y --no-progress
        }
        & $iscc `
          /DAppVersion=${{ needs.version.outputs.version }} `
          /DServerPublishDir=..\publish\server `
          /DTrayPublishDir=..\publish\tray `
          installer\asERP.Server.Setup.iss
      shell: pwsh

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: installer
        path: installer/output/asERP-Server-Setup-${{ needs.version.outputs.version }}.exe

  release:
    runs-on: ubuntu-latest
    needs: [version, build-installer]
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # "server-v" prefix keeps server releases apart from desktop client tags ("v...");
        # the tray update checker filters on this prefix — never use /releases/latest.
        tag_name: server-v${{ needs.version.outputs.version }}
        name: asERP Server v${{ needs.version.outputs.version }}
        body: |
          ## asERP Server v${{ needs.version.outputs.version }} (Windows)

          Self-contained Windows installer — no .NET runtime required.
          Installs the asERP server as a Windows service plus a tray app for
          status, start/stop, settings and database backup/restore.

          ### Installation
          1. Download `asERP-Server-Setup-${{ needs.version.outputs.version }}.exe`
          2. Run the installer (data is stored in `C:\ProgramData\asERP`)
          3. The service starts automatically; the tray icon appears after login

          Upgrades over an existing installation keep all data and settings.

          ---

          🤖 Automatically built by GitHub Actions
        draft: false
        prerelease: false
        files: artifacts/installer/*.exe
        token: ${{ secrets.GITHUB_TOKEN }}
